<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Page title</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100%;
    width:100%;
    background-color:black;
}

div{
    height:750px;
    width:80%;
    color:white;
    background-color:black;
    border-radius:20px;
    margin-top:180px;
    margin-left:10%;
    box-shadow:0px 0px 40px #00ff66;
}

h1{
    height:90px;
    width:100%;
    font-size:65px;
    margin-top:10%;
    padding-left:10%;
    padding-top:60px;
}

section{
    margin-left:10%;
    margin-top:90px;
}

.letter{
    height:35px;
    width:160px;
    font-size:30px;
}

.entry{
    height:70px;
    width:89%;
    color:white;
    background-color:#333333;
    font-size:35px;
    padding-left:20px;
    border-radius:13px;
}

button{
    height:70px;
    width:80%;
    color:white;
    background-color:green;
    font-size:45px;
    margin-left:10%;
    margin-top:30px;
    border-radius:13px;
}

#pas{
    position:relative;
    top:-45px;
}

h2{
    font-size:30px;
    margin-top:27px;
    margin-left:290px;
}

</style>

</head>

<body>

<div>

<h1>Welcome Brother</h1>

<section>
<h3 class="letter">Username</h3>
<input class="entry" type="text" placeholder="Enter your username">
</section>

<section id="pas">
<h3 class="letter">Password</h3>
<input class="entry" type="password" placeholder="Enter your password">
</section>

<button>Login</button>

<h2>Forgot Password?</h2>

</div>

</body>
</html>
